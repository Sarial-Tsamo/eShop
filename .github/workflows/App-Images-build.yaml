name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
    # paths:
    #   - "src/**"
    #   - "webapp-build.yml"
  workflow_dispatch:
  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Catalog.API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/catalog-api:latest -f src/Catalog.API/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/catalog-api:latest

      - name: Build and Push Basket.API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/basket-api:latest -f src/Basket.API/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/basket-api:latest

      - name: Build and Push Ordering.API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ordering-api:latest -f src/Ordering.API/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/ordering-api:latest

      - name: Build and Push Identity.API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/identity-api:latest -f src/Identity.API/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/identity-api:latest

      - name: Build and Push OrderProcessor
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/orderprocessor:latest -f src/OrderProcessor/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/orderprocessor:latest

      - name: Build and Push WebApp
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/webapp:latest -f src/WebApp/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/webapp:latest

      # - name: Build and Push Payment-processor
      #   run: |
      #     docker build -t ${{ secrets.DOCKER_USERNAME }}/payment-processor:latest -f src/Payment-processor/Dockerfile .
      #     docker push ${{ secrets.DOCKER_USERNAME }}/payment-processor:latest

    
