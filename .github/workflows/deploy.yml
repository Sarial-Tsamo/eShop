name: Deploy eShop to K3s

on:
  push:
    branches: [ "deploy" ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Remote Deployment Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_SSH_IP }}      
          username: ubuntu
          key: ${{ secrets.SSH_SSH_KEY }} 
          script: |
            cd ~/eShop
            git pull origin deploy
            chmod +x ./deploy.sh
            ./deploy.sh