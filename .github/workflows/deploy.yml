name: Deploy eShop to K3s

on:
  push:
    branches: [ "kube_Branch" ] 

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Remote Deployment Script
        run: |
          cd ~/eShop
          git pull origin kube_Branch
          chmod +x ./deploy.sh
          ./deploy.sh

