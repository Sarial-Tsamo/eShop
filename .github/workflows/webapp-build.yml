name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
    paths:
      - "src/WebApp/**"
  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Catalog.API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eshop-catalog:latest -f src/Catalog.API/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/eshop-catalog:latest

      - name: Build and Push Basket.API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eshop-basket:latest -f src/Basket.API/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/eshop-basket:latest

      - name: Build and Push Ordering.API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eshop-ordering:latest -f src/Ordering.API/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/eshop-ordering:latest

      - name: Build and Push Identity.API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eshop-identity:latest -f src/Identity.API/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/eshop-identity:latest

      - name: Build and Push OrderProcessor
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eshop-orderprocessor:latest -f src/OrderProcessor/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/eshop-orderprocessor:latest

      - name: Build and Push WebApp
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eshop-webapp:latest -f src/WebApp/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/eshop-webapp:latest

    
