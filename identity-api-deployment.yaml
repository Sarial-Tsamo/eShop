---
apiVersion: v1
kind: Service
metadata:
  name: identity-api
  namespace: eshop
  labels:
    app: identity-api
spec:
  ports:
    - port: 80
      targetPort: 8080
      name: http
    - port: 443
      targetPort: 8443
      name: https
  selector:
    app: identity-api
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: eshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-api
  template:
    metadata:
      labels:
        app: identity-api
    spec:
      containers:
        - name: identity-api
          image: sarialbebeto/identity-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080;https://+:8443"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ConnectionStrings__IdentityDb
              value: "Host=postgres;Port=5432;Database=identitydb;Username=postgres;Password=postgres;"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
