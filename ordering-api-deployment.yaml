---
apiVersion: v1
kind: Service
metadata:
  name: ordering-api
  namespace: eshop
  labels:
    app: ordering-api
spec:
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app: ordering-api
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering-api
  namespace: eshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ordering-api
  template:
    metadata:
      labels:
        app: ordering-api
    spec:
      containers:
        - name: ordering-api
          image: sarialbebeto/ordering-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ConnectionStrings__OrderingDb
              value: "Host=postgres;Port=5432;Database=orderingdb;Username=postgres;Password=postgres;"
            - name: RabbitMQ__Host
              value: "eventbus"
            - name: Identity__Url
              value: "http://identity-api"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
