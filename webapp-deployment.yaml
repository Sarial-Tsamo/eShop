---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: eshop
  labels:
    app: webapp
spec:
  ports:
    - port: 80
      targetPort: 8080
      name: http
    - port: 443
      targetPort: 8443
      name: https
  selector:
    app: webapp
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: eshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: sarialbebeto/webapp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080;https://+:8443"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: IdentityUrl
              value: "http://identity-api"
            - name: BasketApiClient
              value: "http://basket-api"
            - name: CatalogApiClient
              value: "http://catalog-api"
            - name: OrderingApiClient
              value: "http://ordering-api"
            - name: CallBackUrl
              value: "http://webapp"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
