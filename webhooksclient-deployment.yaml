---
apiVersion: v1
kind: Service
metadata:
  name: webhooksclient
  namespace: eshop
  labels:
    app: webhooksclient
spec:
  ports:
    - port: 80
      targetPort: 8080
      name: http
    - port: 443
      targetPort: 8443
      name: https
  selector:
    app: webhooksclient
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhooksclient
  namespace: eshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhooksclient
  template:
    metadata:
      labels:
        app: webhooksclient
    spec:
      containers:
        - name: webhooksclient
          image: sarialbebeto/webhooksclient:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080;https://+:8443"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: IdentityUrl
              value: "http://identity-api"
            - name: CallBackUrl
              value: "http://webhooksclient"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
